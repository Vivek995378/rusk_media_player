name: rusk_media_player
description: "Rusk Media Micro-Drama Player"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_cache_manager: ^3.4.1
  fpdart: ^1.1.0
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^2.0.3
  preload_page_view: ^0.2.0
  video_player: ^2.9.5
  go_router: ^14.8.1
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.3.13

flutter_launcher_icons:
  image_path: "assets/icons/rusk_media_icon.png"
  android: true
  ios: true
  adaptive_icon_background: "#FF3D00"
  adaptive_icon_foreground: "assets/icons/rusk_media_icon.png"
  web:
    generate: true
    image_path: "assets/icons/rusk_media_icon.png"

flutter_native_splash:
  color: "#FF3D00"
  image: assets/icons/rusk_media_icon.png
  android_12:
    image: assets/icons/rusk_media_icon.png
    color: "#FF3D00"
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/gifs/
